<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Set Password · Cue Point</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-body" data-page="set-password">
  <div class="mobile-top">
    <a class="logo" href="#"><img src="assets/logo-wide.jpg" alt="Cue Point"></a>
    <span class="status-line"><span class="pulse"></span>Player setup</span>
  </div>

  <div class="app-shell">
    <aside class="side">
      <a class="logo" href="#"><img src="assets/logo-wide.jpg" alt="Cue Point"></a>
      <nav class="side-nav">
        <a class="active" href="set-password.html">Set password</a>
        <a href="login.html">Player login</a>
      </nav>
    </aside>

    <main class="app-main">
      <div class="topbar">
        <div>
          <h1>Set your password</h1>
          <p>Create your Cue Point password to finish setting up your player account</p>
        </div>
      </div>

      <section class="app-grid">
        <div class="card">
          <h2>Player account setup</h2>
          <form id="setPasswordForm" class="form">
            <div>
              <label>New password</label>
              <input id="newPassword" type="password" placeholder="Enter a new password" required minlength="6">
            </div>
            <div>
              <label>Confirm password</label>
              <input id="confirmPassword" type="password" placeholder="Confirm your password" required minlength="6">
            </div>
            <button class="btn red full" type="submit">Set password</button>
          </form>
          <div id="setPasswordMsg"></div>
        </div>

        <div class="card soft-card">
          <h2>What happens next?</h2>
          <p class="quiet">After your password is saved, you’ll be sent to the player login page.</p>
          <p class="quiet">Use your email address and new password to log in.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const PUBLIC_LOGIN_URL = "login.html";

    function message(html) {
      document.getElementById("setPasswordMsg").innerHTML = html;
    }

    function getSupabaseClient() {
      if (!window.supabase || !window.CUEPOINT_SUPABASE_URL || !window.CUEPOINT_SUPABASE_ANON_KEY) {
        return null;
      }
      return window.supabase.createClient(
        window.CUEPOINT_SUPABASE_URL,
        window.CUEPOINT_SUPABASE_ANON_KEY
      );
    }

    async function finishInviteLogin(client) {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      if (code) {
        const { error } = await client.auth.exchangeCodeForSession(code);
        if (error) throw error;
        window.history.replaceState({}, document.title, window.location.pathname);
      }

      const { data } = await client.auth.getSession();
      if (!data.session) {
        throw new Error("This invite link has expired or is invalid. Ask the club to send a new invite.");
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const client = getSupabaseClient();
      if (!client) {
        message('<div class="notice">Supabase is not connected.</div>');
        return;
      }

      try {
        await finishInviteLogin(client);
        message('<div class="notice">Invite accepted. Please set your password.</div>');
      } catch (error) {
        message(`<div class="notice"><b>Invite problem</b><br>${error.message}</div>`);
        document.getElementById("setPasswordForm").style.display = "none";
        return;
      }

      document.getElementById("setPasswordForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const password = document.getElementById("newPassword").value;
        const confirm = document.getElementById("confirmPassword").value;

        if (password.length < 6) {
          message('<div class="notice">Password must be at least 6 characters.</div>');
          return;
        }

        if (password !== confirm) {
          message('<div class="notice">Passwords do not match.</div>');
          return;
        }

        message('<div class="notice">Saving password...</div>');

        const { error } = await client.auth.updateUser({ password });

        if (error) {
          message(`<div class="notice"><b>Password not saved</b><br>${error.message}</div>`);
          return;
        }

        message('<div class="notice"><b>Password set successfully.</b><br>Taking you to the player login page...</div>');

        await client.auth.signOut();

        setTimeout(() => {
          window.location.href = PUBLIC_LOGIN_URL;
        }, 1500);
      });
    });
  </script>
</body>
</html>
